<!DOCTYPE html>
<html>
<head>
    <title>Retrieve sessionStorage Value</title>
</head>
<body>
<h1>sessionStorage Value</h1>
<p id="value"></p>
<button onclick="checkSessionStorage()" type="button">Check Session Storage</button>
<script>
    let value = localStorage.getItem("myKey");
    sessionStorage.setItem("myKey", value);
    localStorage.removeItem("myKey");

    function checkSessionStorage() {
        alert(value);
    }
</script>
</body>
</html>
