<!DOCTYPE html>
<html>
  <head>
    <title>Retrieve sessionStorage Value</title>
  </head>
  <body>
    <h1>sessionStorage Value</h1>
    <p id="value"></p>

    <script>
      // Set a sample value in localStorage for a specific key
      //localStorage.setItem('myKey', 'Hello, localStorage!');
      // Retrieve the value from localStorage
      var value = localStorage.getItem("myKey");

      // Store the value in sessionStorage
      sessionStorage.setItem("myKey", value);

      // Delete the item from localStorage
      localStorage.removeItem("myKey");

      // Display the retrieved value on the page
      alert(value);
    </script>
  </body>
</html>
